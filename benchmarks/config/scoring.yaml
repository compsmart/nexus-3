suite_weights:
  memory_recall: 0.20
  multihop: 0.30
  scalability: 0.15
  learning_transfer: 0.15
  composite: 0.20

primary_metric:
  memory_recall: accuracy
  multihop: accuracy
  scalability: accuracy
  learning_transfer: accuracy
