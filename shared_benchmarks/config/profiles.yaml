profiles:
  smoke:
    description: "Fast dev sanity check (~2 min)"
    suites:
      memory_recall: {k_values: [10], n_distractors: 2, n_queries: 5}
      multihop: {hop_values: [2, 3], k_values: [5], n_chains_per_config: 2}
      scalability: {k_values: [10, 50]}
      learning_transfer: {}
      composite: {}
  standard:
    description: "Standard run (~15 min)"
    suites:
      memory_recall: {k_values: [10, 25, 50, 100], n_distractors: 5, n_queries: 20}
      multihop: {hop_values: [2, 3, 4, 5], k_values: [5, 10, 50, 100], n_chains_per_config: 10}
      scalability: {k_values: [10, 25, 50, 100, 200, 500]}
      learning_transfer: {}
      composite: {}
  quality_first:
    description: "Full validation (~45 min)"
    suites:
      memory_recall: {k_values: [10, 25, 50, 100, 200], n_distractors: 10, n_queries: 40}
      multihop: {hop_values: [2, 3, 4, 5], k_values: [5, 10, 50, 100, 200], n_chains_per_config: 20}
      scalability: {k_values: [10, 25, 50, 100, 200, 500]}
      learning_transfer: {}
      composite: {}
